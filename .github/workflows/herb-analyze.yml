name: herb analyze
on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "*"
jobs:
  herb:
    name: herb analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
        with:
          bundler-cache: true
      - run: bundle exec herb analyze app/
