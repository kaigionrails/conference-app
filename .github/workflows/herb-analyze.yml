name: herb analyze
on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "*"
jobs:
  herb:
    name: herb analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
        with:
          bundler-cache: true
      - run: bundle exec herb analyze app/
